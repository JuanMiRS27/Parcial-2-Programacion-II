server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST:${MYSQL_HOST:localhost}}:${MYSQLPORT:${MYSQL_PORT:3306}}/${MYSQLDATABASE:${MYSQL_DATABASE:auth_db}}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQLUSER:${MYSQL_USER:root}}
    password: ${MYSQLPASSWORD:${MYSQL_PASSWORD:root}}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS10YWxsZXItcGFyY2lhbC0yMDI2}
    expiration: ${JWT_EXPIRATION:86400000}
