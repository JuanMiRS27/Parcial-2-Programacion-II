<app-header></app-header>
<main class="content">
  <h2>Panel de administrador</h2>
  <p>Solo usuarios ADMIN pueden ver esta página.</p>
  <table>
    <tr><th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Acciones</th></tr>
    <tr *ngFor="let u of users">
      <td>{{ u.id }}</td><td>{{ u.nombre }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td>
      <td><button (click)="delete(u.id)">Eliminar</button></td>
    </tr>
  </table>
</main>
