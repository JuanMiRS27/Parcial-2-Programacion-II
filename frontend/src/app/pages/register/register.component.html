<section class="auth-shell">
  <main class="card">
    <h2>Crear cuenta</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <input formControlName="nombre" placeholder="Nombre completo">
      <input formControlName="email" placeholder="Correo electrónico">
      <input type="password" formControlName="password" placeholder="Contraseña (mín. 6)">
      <button>Registrar</button>
    </form>
    <p class="error">{{ error }}</p>
    <a class="link-btn" routerLink="/login">Volver al login</a>
  </main>
</section>
