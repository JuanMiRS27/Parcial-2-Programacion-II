<app-header></app-header>
<main class="content">
  <div class="toolbar">
    <h2>Carros en taller</h2>
    <button (click)="goCreate()">Crear carro</button>
  </div>
  <p class="error" *ngIf="error">{{ error }}</p>
  <table>
    <tr><th>ID</th><th>Placa</th><th>Modelo</th><th>Estado</th><th>Acciones</th></tr>
    <tr *ngFor="let c of carros">
      <td>{{ c.id }}</td><td>{{ c.placa }}</td><td>{{ c.modelo }}</td><td>{{ c.estado }}</td>
      <td class="actions">
        <a class="link-btn" [routerLink]="['/carros/detalle', c.id]">Detalle</a>
        <a class="link-btn" *ngIf="isAdmin()" [routerLink]="['/carros/editar', c.id]">Editar</a>
        <button *ngIf="isAdmin()" (click)="delete(c.id)">Eliminar</button>
      </td>
    </tr>
    <tr *ngIf="!error && carros.length === 0">
      <td colspan="5">No hay carros registrados.</td>
    </tr>
  </table>
</main>
