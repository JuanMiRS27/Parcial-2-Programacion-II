<app-header></app-header>
<main class="content" *ngIf="carro">
  <h2>Detalle de carro</h2>
  <p><b>Placa:</b> {{ carro.placa }}</p>
  <p><b>Modelo:</b> {{ carro.modelo }}</p>
  <p><b>Fecha Ingreso:</b> {{ carro.fechaIngreso }}</p>
  <p><b>Estado:</b> {{ carro.estado }}</p>
  <p><b>Tipo Daño:</b> {{ carro.tipoDanio }}</p>
</main>
