<app-header></app-header>
<main class="content">
  <h2>Editar carro</h2>
  <form [formGroup]="form" (ngSubmit)="save()">
    <input formControlName="placa" placeholder="Placa">
    <input formControlName="modelo" placeholder="Modelo">
    <input type="date" formControlName="fechaIngreso">
    <select formControlName="estado"><option *ngFor="let e of estados" [value]="e">{{ e }}</option></select>
    <input formControlName="tipoDanio" placeholder="Tipo daño">
    <button>Actualizar</button>
  </form>
</main>
